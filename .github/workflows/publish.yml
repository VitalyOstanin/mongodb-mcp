name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write  # Required for creating GitHub releases
      id-token: write  # Required for npm provenance

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Verify package contents
      run: |
        echo "Package contents:"
        npm pack --dry-run
        echo ""
        echo "Package verification complete"

    - name: Publish to npm (Trusted Publishing via OIDC)
      run: npm publish --provenance --access public

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create ${{ github.ref_name }} \
          --title "Release ${{ github.ref_name }}" \
          --notes "New release of MongoDB MCP Server

        **Package**: \`@vitalyostanin/mongodb-mcp@${{ github.ref_name }}\`

        Install with:
        \`\`\`bash
        npm install @vitalyostanin/mongodb-mcp@${{ github.ref_name }}
        \`\`\`

        See [CHANGELOG](https://github.com/VitalyOstanin/mongodb-mcp/blob/${{ github.ref_name }}/CHANGELOG.md) for details."
