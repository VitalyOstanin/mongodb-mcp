name: CI

# Run on push to master (after merges) and on PRs targeting master.
# Pull requests from branches in the same repo would otherwise be tested twice
# (once on push, once on pull_request).
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Typecheck production sources
      run: npm run typecheck

    - name: Typecheck tests
      run: npm run typecheck:tests

    - name: Run tests
      run: npm test

    - name: Build project
      run: npm run build

    - name: Verify build output
      run: |
        test -f dist/index.js || { echo "Error: dist/index.js not found"; exit 1; }
        test -x dist/index.js || { echo "Error: dist/index.js is not executable"; exit 1; }
        echo "Build verification passed"

    - name: List build artifacts
      run: ls -lh dist/

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]

    services:
      mongo:
        image: mongo:8.0.21
        env:
          MONGO_INITDB_ROOT_USERNAME: test
          MONGO_INITDB_ROOT_PASSWORD: test
        ports:
          - 57017:27017
        options: >-
          --health-cmd "mongosh --quiet -u test -p test --authenticationDatabase admin --eval 'db.adminCommand(\"ping\").ok'"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run integration tests
      run: npm run test:integration
